name: Create release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.1)'
        required: true

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            os: macos-14
            binary: ck-osx-arm64
          - rid: osx-x64
            os: ubuntu-latest
            binary: ck-osx-x64
          - rid: linux-x64
            os: ubuntu-latest
            binary: ck-linux-x64
          - rid: win-x64
            os: windows-latest
            binary: ck-win-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish ${{ matrix.rid }}
        shell: bash
        run: |
          dotnet publish src/ContextKing.Cli/ContextKing.Cli.csproj \
            -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true \
            -o /tmp/ck-publish -v q
          ext=""
          [[ "${{ matrix.rid }}" == win-* ]] && ext=".exe"
          cp /tmp/ck-publish/ck${ext} ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }} 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: ${{ matrix.binary }}

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: /tmp/binaries
          merge-multiple: true

      - name: Restore execute bits
        run: |
          chmod +x /tmp/binaries/ck-osx-arm64
          chmod +x /tmp/binaries/ck-osx-x64
          chmod +x /tmp/binaries/ck-linux-x64

      - name: Build per-platform archives
        run: |
          VERSION="${RELEASE_TAG}"

          build_archive() {
            local platform="$1"   # osx-arm64 | osx-x64 | linux-x64
            local binary="$2"     # ck-osx-arm64 | ...
            local archive="context-king-${platform}.tar.gz"

            # Stage the files
            local stage="/tmp/stage-${platform}/context-king"
            mkdir -p "$stage/scripts"
            mkdir -p "$stage/skills/ck"
            mkdir -p "$stage/skills/ck-find-scope"
            mkdir -p "$stage/skills/ck-signatures"
            mkdir -p "$stage/skills/ck-get-method-source"
            mkdir -p "$stage/skills/ck-index"
            mkdir -p "$stage/skills/ck-expand-folder"
            mkdir -p "$stage/hooks"
            mkdir -p "$stage/models/bge-small-en-v1.5/onnx"
            mkdir -p "$stage/rules"
            mkdir -p "$stage/plugins"

            cp /tmp/binaries/"$binary"         "$stage/skills/ck/$binary"
            chmod +x                            "$stage/skills/ck/$binary"
            cp skills/ck/ck                    "$stage/skills/ck/ck"
            cp skills/ck/ck.cmd                "$stage/skills/ck/ck.cmd"
            chmod +x                            "$stage/skills/ck/ck"
            cp skills/ck-find-scope/SKILL.md   "$stage/skills/ck-find-scope/"
            cp skills/ck-signatures/SKILL.md   "$stage/skills/ck-signatures/"
            cp skills/ck-get-method-source/SKILL.md "$stage/skills/ck-get-method-source/"
            cp skills/ck-index/SKILL.md        "$stage/skills/ck-index/"
            cp skills/ck-expand-folder/SKILL.md "$stage/skills/ck-expand-folder/"
            cp hooks/agent-usage-guard.sh      "$stage/hooks/"
            cp hooks/agent-usage-guard.ps1     "$stage/hooks/"
            cp hooks/ck-bash-guard.sh          "$stage/hooks/"
            cp hooks/ck-bash-guard.ps1         "$stage/hooks/"
            cp hooks/ck-scope-hint.sh          "$stage/hooks/"
            cp hooks/ck-scope-hint.ps1         "$stage/hooks/"
            cp hooks/ck-update-check.sh        "$stage/hooks/"
            cp hooks/ck-update-check.ps1       "$stage/hooks/"
            chmod +x "$stage/hooks/agent-usage-guard.sh" \
                     "$stage/hooks/ck-bash-guard.sh" \
                     "$stage/hooks/ck-scope-hint.sh" \
                     "$stage/hooks/ck-update-check.sh"
            cp -r models/bge-small-en-v1.5/.  "$stage/models/bge-small-en-v1.5/"
            cp rules/ck-code-search-protocol.md "$stage/rules/"
            cp plugins/ck-guards.ts            "$stage/plugins/"
            cp THIRD_PARTY_LICENSES.md         "$stage/"
            cp scripts/deploy.sh               "$stage/scripts/"
            cp scripts/deploy-codex.sh         "$stage/scripts/"
            cp scripts/deploy-opencode.sh      "$stage/scripts/"
            cp scripts/install.sh              "$stage/scripts/"
            chmod +x "$stage/scripts/"*.sh

            tar -czf "/tmp/$archive" -C "/tmp/stage-${platform}" context-king
            echo "Built: $archive"
          }

          build_archive "osx-arm64"  "ck-osx-arm64"
          build_archive "osx-x64"    "ck-osx-x64"
          build_archive "linux-x64"  "ck-linux-x64"

          # Windows zip
          win_stage="/tmp/stage-win/context-king"
          mkdir -p "$win_stage/scripts"
          mkdir -p "$win_stage/skills/ck"
          mkdir -p "$win_stage/skills/ck-find-scope"
          mkdir -p "$win_stage/skills/ck-signatures"
          mkdir -p "$win_stage/skills/ck-get-method-source"
          mkdir -p "$win_stage/skills/ck-index"
          mkdir -p "$win_stage/skills/ck-expand-folder"
          mkdir -p "$win_stage/hooks"
          mkdir -p "$win_stage/models/bge-small-en-v1.5/onnx"
          mkdir -p "$win_stage/rules"
          mkdir -p "$win_stage/plugins"

          cp /tmp/binaries/ck-win-x64.exe    "$win_stage/skills/ck/"
          cp skills/ck/ck                    "$win_stage/skills/ck/"
          cp skills/ck/ck.cmd                "$win_stage/skills/ck/"
          cp skills/ck-find-scope/SKILL.md   "$win_stage/skills/ck-find-scope/"
          cp skills/ck-signatures/SKILL.md   "$win_stage/skills/ck-signatures/"
          cp skills/ck-get-method-source/SKILL.md "$win_stage/skills/ck-get-method-source/"
          cp skills/ck-index/SKILL.md        "$win_stage/skills/ck-index/"
          cp skills/ck-expand-folder/SKILL.md "$win_stage/skills/ck-expand-folder/"
          cp hooks/agent-usage-guard.sh      "$win_stage/hooks/"
          cp hooks/agent-usage-guard.ps1     "$win_stage/hooks/"
          cp hooks/ck-bash-guard.sh          "$win_stage/hooks/"
          cp hooks/ck-bash-guard.ps1         "$win_stage/hooks/"
          cp hooks/ck-scope-hint.sh          "$win_stage/hooks/"
          cp hooks/ck-scope-hint.ps1         "$win_stage/hooks/"
          cp hooks/ck-update-check.sh        "$win_stage/hooks/"
          cp hooks/ck-update-check.ps1       "$win_stage/hooks/"
          cp -r models/bge-small-en-v1.5/.  "$win_stage/models/bge-small-en-v1.5/"
          cp rules/ck-code-search-protocol.md "$win_stage/rules/"
          cp plugins/ck-guards.ts            "$win_stage/plugins/"
          cp THIRD_PARTY_LICENSES.md         "$win_stage/"
          cp scripts/deploy.ps1              "$win_stage/scripts/"
          cp scripts/deploy-codex.ps1        "$win_stage/scripts/"
          cp scripts/deploy-opencode.ps1     "$win_stage/scripts/"
          cp scripts/install.ps1             "$win_stage/scripts/"

          cd /tmp/stage-win && zip -r /tmp/context-king-windows.zip context-king
          echo "Built: context-king-windows.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Context King ${{ env.RELEASE_TAG }}"
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            ## Install

            Run the install command **from the root of the repository** where you want Context King installed.
            Initialize at least one AI CLI tool first (Claude Code, Codex CLI, or OpenCode).

            **Mac / Linux (one-liner):**
            ```bash
            curl -fsSL https://github.com/Fredrik-C/ContextKing/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell 7+):**
            ```powershell
            irm https://github.com/Fredrik-C/ContextKing/releases/latest/download/install.ps1 | iex
            ```

            Or download the archive for your platform and run `bash scripts/install.sh` from within it.

            ## Platform archives
            | File | Platform |
            |------|----------|
            | `context-king-osx-arm64.tar.gz` | macOS Apple Silicon |
            | `context-king-osx-x64.tar.gz` | macOS Intel |
            | `context-king-linux-x64.tar.gz` | Linux x86-64 |
            | `context-king-windows.zip` | Windows x86-64 |
          files: |
            /tmp/context-king-osx-arm64.tar.gz
            /tmp/context-king-osx-x64.tar.gz
            /tmp/context-king-linux-x64.tar.gz
            /tmp/context-king-windows.zip
            /tmp/binaries/ck-osx-arm64
            /tmp/binaries/ck-osx-x64
            /tmp/binaries/ck-linux-x64
            /tmp/binaries/ck-win-x64.exe
            scripts/install.sh
            scripts/install.ps1
